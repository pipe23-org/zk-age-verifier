name: zk_age_verifier

services:
  app:
    image: ghcr.io/pipe23-org/zk-age-verifier:latest
    restart: unless-stopped
    environment:
      ZK_AGE_VERIFIER_CONFIG: /etc/zk-age-verifier/config.toml
    volumes:
      - ./config.toml:/etc/zk-age-verifier/config.toml:ro
      - ./anchors:/etc/zk-age-verifier/anchors:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
