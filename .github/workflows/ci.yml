name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.11"
      - run: uv sync --locked --no-install-project
      - run: uv run --no-sync ruff check
      - run: uv run --no-sync ruff format --check

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - run: uv run --no-sync mypy

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.11"
      # full sync: the docs build imports the app to dump its OpenAPI schema
      - run: uv sync --locked
      - run: uv run --no-sync interrogate -v src/zk_age_verifier
      - run: uv run --no-sync mkdocs build --strict

  test-fast:
    if: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - run: uv run --no-sync pytest

  test:
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      # Coverage + fail_under come from addopts (pyproject); a bare run is the gate.
      - run: uv run --no-sync pytest

  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.11"
      # The demo site is a standalone uv project (own lock); the relay tests stub
      # the verifier, so they need nothing from the parent package.
      - run: uv sync --locked
        working-directory: examples/site-dc-mdoc
      - run: uv run --no-sync pytest
        working-directory: examples/site-dc-mdoc
